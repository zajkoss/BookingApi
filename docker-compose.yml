services:
  api:
    image: booking-api
    ports:
      - 8080:8080
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=booking_db;Username=booking;Password=booking
      - ConnectionStrings__Redis=redis:6379
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
      POSTGRES_DB: booking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_cache:/data

volumes:
  postgres_data:
  redis_cache:
    