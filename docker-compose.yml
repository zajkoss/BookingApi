services:
  api:
    build:
      context: ./BookingApi
      dockerfile: Dockerfile
    ports:
      - 8080:8080
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=booking_db;Username=booking;Password=booking
      - ConnectionStrings__Redis=redis:6379
      - ASPNETCORE_ENVIRONMENT=Development
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
      POSTGRES_DB: booking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL","pg_isready -U booking -d booking_db" ]
      interval: 30s
      timeout: 10s
      retries: 3
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_cache:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_cache:
    